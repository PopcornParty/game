<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOCITY - Advanced Racing Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1e 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: none;
        }

        .hud {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .speedometer {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 200px;
            height: 120px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #00ff00;
            padding: 15px;
            border-radius: 10px;
        }

        .speed-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff00;
            text-align: center;
            text-shadow: 0 0 10px #00ff00;
        }

        .speed-label {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .gear-display {
            text-align: center;
            font-size: 14px;
            color: #ffff00;
            margin-top: 8px;
        }

        .rpms {
            width: 100%;
            height: 6px;
            background: #222;
            border: 1px solid #00ff00;
            margin-top: 8px;
            border-radius: 3px;
            overflow: hidden;
        }

        .rpm-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff6600);
            width: 0%;
            transition: width 0.05s;
        }

        .top-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            min-width: 400px;
        }

        .lap-time {
            font-size: 24px;
            color: #00ff00;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
        }

        .lap-info {
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
        }

        .mini-map {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            border-radius: 5px;
        }

        .right-panel {
            position: absolute;
            right: 20px;
            top: 240px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            padding: 15px;
            font-size: 12px;
            border-radius: 5px;
            min-width: 200px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            color: #00ff00;
        }

        .stat-label {
            color: #888;
            min-width: 80px;
        }

        .stat-value {
            color: #00ff00;
            font-weight: bold;
        }

        .message-log {
            position: absolute;
            bottom: 250px;
            left: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            padding: 15px;
            font-size: 11px;
            border-radius: 5px;
            max-width: 250px;
            max-height: 200px;
            overflow-y: auto;
        }

        .message {
            color: #00ff00;
            margin: 3px 0;
            text-shadow: 0 0 5px #00ff00;
            line-height: 1.4;
        }

        .damage-indicator {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #ff3333;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 180px;
        }

        .damage-value {
            font-size: 28px;
            color: #ff3333;
            font-weight: bold;
        }

        .damage-label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .damage-bar {
            width: 100%;
            height: 8px;
            background: #222;
            border: 1px solid #ff3333;
            margin-top: 8px;
            border-radius: 3px;
            overflow: hidden;
        }

        .damage-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666);
            width: 0%;
            transition: width 0.1s;
        }

        .controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #666;
            padding: 10px 20px;
            font-size: 11px;
            color: #888;
            border-radius: 5px;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            color: #00ff00;
            font-size: 20px;
        }

        .loading-screen.hidden {
            display: none;
        }

        .loading-bar {
            width: 400px;
            height: 30px;
            border: 2px solid #00ff00;
            margin: 30px 0;
            border-radius: 5px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            width: 0%;
            transition: width 0.3s;
        }

        .checkpoint-notif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 255, 0, 0.2);
            border: 3px solid #00ff00;
            padding: 30px 50px;
            font-size: 32px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00;
            border-radius: 10px;
            pointer-events: none;
            opacity: 0;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes crash {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(-20deg) brightness(1.3); }
        }

        .crash-effect {
            animation: crash 0.3s;
        }

        .leaderboard {
            position: absolute;
            top: 300px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ffff00;
            padding: 15px;
            font-size: 11px;
            border-radius: 5px;
            min-width: 200px;
        }

        .leaderboard-title {
            color: #ffff00;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #ffff00;
        }

        .leaderboard-entry {
            color: #aaa;
            margin: 4px 0;
        }

        .leaderboard-entry.best {
            color: #ffff00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div class="hud">
            <div class="loading-screen" id="loadingScreen">
                <div>VELOCITY Racing Engine</div>
                <div class="loading-bar">
                    <div class="loading-bar-fill" id="loadingBar"></div>
                </div>
                <div id="loadingText">Initializing circuit...</div>
            </div>

            <div class="top-hud">
                <div class="lap-time" id="currentTime">00:00.00</div>
                <div class="lap-info">
                    <span id="lapNumber">LAP 1</span> | 
                    <span id="position">POS: --/--</span>
                </div>
            </div>

            <canvas id="miniMapCanvas" class="mini-map"></canvas>

            <div class="right-panel">
                <div class="stat-row">
                    <span class="stat-label">Speed:</span>
                    <span class="stat-value" id="speedStat">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Throttle:</span>
                    <span class="stat-value" id="throttleStat">0%</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Grip:</span>
                    <span class="stat-value" id="gripStat">100%</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Best Lap:</span>
                    <span class="stat-value" id="bestLap">--:--</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Distance:</span>
                    <span class="stat-value" id="distance">0%</span>
                </div>
            </div>

            <div class="leaderboard" id="leaderboard">
                <div class="leaderboard-title">⚡ RIVALS</div>
            </div>

            <div class="speedometer">
                <div class="speed-value" id="speedDisplay">0</div>
                <div class="speed-label">KM/H</div>
                <div class="gear-display" id="gearDisplay">N</div>
                <div class="rpms">
                    <div class="rpm-bar" id="rpmBar"></div>
                </div>
            </div>

            <div class="damage-indicator">
                <div class="damage-value" id="healthValue">100</div>
                <div class="damage-label">CHASSIS INTEGRITY</div>
                <div class="damage-bar">
                    <div class="damage-fill" id="healthBar"></div>
                </div>
            </div>

            <div class="message-log" id="messageLog"></div>

            <div class="controls-info">
                W/A/S/D - STEER | SPACE - HANDBRAKE | SHIFT - NITRO | R - RESTART | P - PAUSE
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // VELOCITY - PROFESSIONAL RACING SIMULATOR
        // ============================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const miniMapCanvas = document.getElementById('miniMapCanvas');
        const miniMapCtx = miniMapCanvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            miniMapCanvas.width = 200;
            miniMapCanvas.height = 200;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================
        // GAME STATE
        // ============================================
        const gameState = {
            paused: false,
            gameTime: 0,
            currentLapTime: 0,
            bestLapTime: Infinity,
            currentLap: 1,
            completedLaps: 0,
            lapsToWin: 3,
            showCheckpoint: false,
            checkpointTimer: 0,
            crashed: false,
            crashTimer: 0
        };

        // ============================================
        // TRACK GENERATION (Procedural with Bezier curves)
        // ============================================
        class TrackGenerator {
            constructor(seed) {
                this.seed = seed;
                this.trackPoints = [];
                this.trackWidth = 100;
                this.generate();
            }

            seededRandom() {
                this.seed = (this.seed * 9301 + 49297) % 233280;
                return this.seed / 233280;
            }

            generate() {
                const numCheckpoints = 8;
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const radius = Math.min(canvas.width, canvas.height) * 0.35;

                const points = [];
                for (let i = 0; i < numCheckpoints; i++) {
                    const angle = (i / numCheckpoints) * Math.PI * 2;
                    const variance = this.seededRandom() * 60 - 30;
                    const dist = radius + variance;
                    points.push({
                        x: centerX + Math.cos(angle) * dist,
                        y: centerY + Math.sin(angle) * dist
                    });
                }

                // Catmull-Rom spline interpolation for smooth track
                this.trackPoints = [];
                for (let i = 0; i < points.length; i++) {
                    const p0 = points[(i - 1 + points.length) % points.length];
                    const p1 = points[i];
                    const p2 = points[(i + 1) % points.length];
                    const p3 = points[(i + 2) % points.length];

                    for (let t = 0; t < 1; t += 0.02) {
                        const pos = this.catmullRom(p0, p1, p2, p3, t);
                        this.trackPoints.push(pos);
                    }
                }
            }

            catmullRom(p0, p1, p2, p3, t) {
                const t2 = t * t;
                const t3 = t2 * t;

                const v0 = (p2.x - p0.x) * 0.5;
                const v1 = (p3.x - p1.x) * 0.5;
                const x = p1.x + v0 * t + (3 * (p2.x - p1.x) - 2 * v0 - v1) * t2 + 
                    (2 * (p1.x - p2.x) + v0 + v1) * t3;

                const v0y = (p2.y - p0.y) * 0.5;
                const v1y = (p3.y - p1.y) * 0.5;
                const y = p1.y + v0y * t + (3 * (p2.y - p1.y) - 2 * v0y - v1y) * t2 + 
                    (2 * (p1.y - p2.y) + v0y + v1y) * t3;

                return { x, y };
            }

            getPointNormal(index) {
                const current = this.trackPoints[index];
                const next = this.trackPoints[(index + 1) % this.trackPoints.length];
                const dx = next.x - current.x;
                const dy = next.y - current.y;
                const len = Math.sqrt(dx * dx + dy * dy);
                return { x: -dy / len, y: dx / len };
            }

            isOnTrack(x, y) {
                let closest = Infinity;
                for (let i = 0; i < this.trackPoints.length; i++) {
                    const p = this.trackPoints[i];
                    const dist = Math.sqrt((p.x - x) ** 2 + (p.y - y) ** 2);
                    if (dist < closest) closest = dist;
                }
                return closest < this.trackWidth / 2 + 20;
            }

            draw() {
                // Draw track
                ctx.fillStyle = '#1a1a1a';
                ctx.strokeStyle = '#333';
                ctx.lineWidth = this.trackWidth;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';

                ctx.beginPath();
                ctx.moveTo(this.trackPoints[0].x, this.trackPoints[0].y);
                for (let i = 1; i < this.trackPoints.length; i++) {
                    ctx.lineTo(this.trackPoints[i].x, this.trackPoints[i].y);
                }
                ctx.closePath();
                ctx.stroke();

                // Draw center line
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(this.trackPoints[0].x, this.trackPoints[0].y);
                for (let i = 1; i < this.trackPoints.length; i++) {
                    ctx.lineTo(this.trackPoints[i].x, this.trackPoints[i].y);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.setLineDash([]);

                // Draw checkpoints
                for (let i = 0; i < this.trackPoints.length; i += Math.floor(this.trackPoints.length / 8)) {
                    const p = this.trackPoints[i];
                    ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                    ctx.fillRect(p.x - this.trackWidth / 2, p.y - 10, this.trackWidth, 20);
                }

                // Draw grass
                ctx.fillStyle = '#0a3a0a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Redraw background
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#0f3a1f');
                gradient.addColorStop(1, '#1a2f2f');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // ============================================
        // PLAYER CAR PHYSICS ENGINE
        // ============================================
        class Car {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.angle = 0;
                this.angularVelocity = 0;

                // Vehicle specs
                this.mass = 1300;
                this.maxSpeed = 280;
                this.acceleration = 0.35;
                this.friction = 0.08;
                this.brakePower = 0.15;
                this.handbrakeGrip = 0.5;
                this.turnSpeed = 0.08;
                this.length = 30;
                this.width = 16;

                // Engine
                this.throttle = 0;
                this.isBraking = false;
                this.isHandbraking = false;
                this.gear = 0; // -1=reverse, 0=neutral, 1-6=forward
                this.rpm = 0;
                this.maxRPM = 8000;

                // Suspension & damage
                this.health = 100;
                this.maxHealth = 100;
                this.suspensionCompression = 0;
                this.wheelSlip = 0;
                this.driftAngle = 0;

                // Nitro
                this.nitroFuel = 100;
                this.maxNitro = 100;
                this.isNitroActive = false;

                // Lap tracking
                this.lastCheckpoint = 0;
                this.checkpointsPassed = 0;
                this.lapStartTime = 0;
                this.crossedStartLine = false;

                // Advanced physics
                this.tireTemperature = 80;
                this.aerodynamicDrag = 0.0001;
                this.rollingResistance = 0.003;
            }

            update(input, track) {
                // Input handling
                this.throttle = input.throttle;
                this.isBraking = input.braking;
                this.isHandbraking = input.handbraking;

                // Engine simulation
                this.gear = input.gear;
                if (this.gear !== 0) {
                    const gearRatios = [-3.5, 3.5, 2.8, 2.2, 1.8, 1.5, 1.2];
                    const gearRatio = gearRatios[this.gear + 1];
                    const wheelspin = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    this.rpm = (wheelspin / this.maxSpeed) * this.maxRPM * gearRatio;
                    this.rpm = Math.min(this.maxRPM, Math.max(0, this.rpm));
                }

                // Acceleration and braking
                let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);

                let forceAmount = 0;
                if (this.gear > 0) {
                    forceAmount = this.throttle * this.acceleration;
                    if (this.isNitroActive && this.nitroFuel > 0) {
                        forceAmount *= 1.5;
                        this.nitroFuel -= 1;
                    } else {
                        this.isNitroActive = false;
                    }
                } else if (this.gear < 0) {
                    forceAmount = this.throttle * this.acceleration * 0.6;
                }

                if (this.isBraking && speed > 0) {
                    forceAmount = -this.brakePower;
                }

                // Apply drag and resistance
                const dragForce = speed * speed * this.aerodynamicDrag;
                const resistanceForce = speed * this.rollingResistance;
                const totalResistance = dragForce + resistanceForce;

                // Grip calculation based on tire temperature and steering
                let grip = 1.0;
                if (this.isHandbraking) {
                    grip = this.handbrakeGrip;
                    this.tireTemperature = Math.min(150, this.tireTemperature + 2);
                } else {
                    this.tireTemperature = Math.max(80, this.tireTemperature - 0.5);
                }

                // Steering
                this.angle += input.steering * this.turnSpeed * (speed / this.maxSpeed) * grip;

                // Drift physics
                if (this.isHandbraking && speed > 20) {
                    this.driftAngle = this.angle + input.steering * 0.3;
                } else {
                    this.driftAngle += (this.angle - this.driftAngle) * 0.05;
                }

                // Calculate new velocity
                const accelerationVector = forceAmount / this.mass;
                this.vx += Math.cos(this.angle) * accelerationVector - Math.cos(this.angle) * totalResistance;
                this.vy += Math.sin(this.angle) * accelerationVector - Math.sin(this.angle) * totalResistance;

                // Speed limiter
                speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    const scale = this.maxSpeed / speed;
                    this.vx *= scale;
                    this.vy *= scale;
                }

                // Collision with track boundaries
                if (!track.isOnTrack(this.x, this.y)) {
                    this.health -= 0.5;
                    this.vx *= 0.7;
                    this.vy *= 0.7;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Wheel slip for visual effect
                this.wheelSlip = Math.abs(Math.sin(this.driftAngle - this.angle)) * speed;

                // Suspension compression (visual only)
                this.suspensionCompression = Math.abs(forceAmount) * 0.1;
            }

            checkpointLogic(track, checkpointIndex) {
                if (checkpointIndex !== this.lastCheckpoint) {
                    this.lastCheckpoint = checkpointIndex;
                    this.checkpointsPassed++;

                    const totalCheckpoints = Math.floor(track.trackPoints.length / 8);
                    if (checkpointIndex === 0 && this.checkpointsPassed > 1) {
                        // Crossed start line = completed lap
                        const lapTime = gameState.gameTime - this.lapStartTime;
                        gameState.currentLapTime = lapTime;

                        if (lapTime < gameState.bestLapTime) {
                            gameState.bestLapTime = lapTime;
                            addMessage('🏁 NEW BEST LAP!');
                        }

                        gameState.completedLaps++;
                        gameState.currentLap++;
                        this.lapStartTime = gameState.gameTime;

                        gameState.showCheckpoint = true;
                        gameState.checkpointTimer = 120;

                        return true; // Lap completed
                    }
                }
                return false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.driftAngle);

                // Car body
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.length, this.width, 0, 0, Math.PI * 2);
                ctx.fill();

                // Car outline
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Windshield
                ctx.fillStyle = 'rgba(100, 150, 255, 0.5)';
                ctx.fillRect(-this.length / 2, -this.width / 3, this.length / 2, this.width / 3);

                // Wheel slip effect (drift smoke)
                if (this.wheelSlip > 10) {
                    ctx.fillStyle = `rgba(200, 200, 200, ${Math.min(0.4, this.wheelSlip / 50)})`;
                    ctx.beginPath();
                    ctx.arc(-this.length / 3, -this.width / 2, 4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(-this.length / 3, this.width / 2, 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Direction indicator
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(this.length, 0);
                ctx.stroke();

                ctx.restore();

                // Health indicator
                ctx.fillStyle = this.health > 50 ? '#00ff00' : this.health > 25 ? '#ffff00' : '#ff3333';
                ctx.fillRect(this.x - 15, this.y - 25, 30 * (this.health / 100), 4);
            }

            getNitroPercentage() {
                return (this.nitroFuel / this.maxNitro) * 100;
            }

            getGripPercentage() {
                return (1 - this.wheelSlip / 100) * 100;
            }
        }

        // ============================================
        // AI OPPONENTS (Racing Logic)
        // ============================================
        class AIOpponent extends Car {
            constructor(x, y, name, difficulty) {
                super(x, y);
                this.name = name;
                this.difficulty = difficulty; // 1-3
                this.maxSpeed = 250 + difficulty * 10;
                this.lapTimes = [];
                this.targetCheckpoint = 0;
                this.skillVariation = Math.random() * 0.3 + 0.7;
            }

            update(track, playerCar) {
                const currentCheckpoint = Math.floor((this.checkpointsPassed % Math.floor(track.trackPoints.length / 8)));
                const targetPoint = track.trackPoints[currentCheckpoint * Math.floor(track.trackPoints.length / 8)];

                const dx = targetPoint.x - this.x;
                const dy = targetPoint.y - this.y;
                const targetAngle = Math.atan2(dy, dx);
                let angleDiff = targetAngle - this.angle;

                // Normalize angle difference
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                const input = {
                    throttle: 1,
                    braking: false,
                    steering: Math.min(1, Math.max(-1, angleDiff * 3)) * this.skillVariation,
                    gear: 1,
                    handbraking: Math.abs(angleDiff) > 0.5 ? 1 : 0
                };

                super.update(input, track);
                this.checkpointLogic(track, currentCheckpoint);
            }

            getLastLapTime() {
                return this.lapTimes.length > 0 ? this.lapTimes[this.lapTimes.length - 1] : Infinity;
            }
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        const input = {
            throttle: 0,
            braking: false,
            steering: 0,
            gear: 0,
            handbraking: false,
            nitroActive: false
        };

        const keys = {};

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = true;

            if (key === 'r') {
                location.reload();
            }

            if (key === 'p') {
                gameState.paused = !gameState.paused;
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = false;
        });

        // ============================================
        // GAME INITIALIZATION
        // ============================================
        const track = new TrackGenerator(42);
        const playerCar = new Car(track.trackPoints[0].x, track.trackPoints[0].y);
        const opponents = [
            new AIOpponent(track.trackPoints[10].x, track.trackPoints[10].y, 'VIPER', 2),
            new AIOpponent(track.trackPoints[20].x, track.trackPoints[20].y, 'PHOENIX', 3),
            new AIOpponent(track.trackPoints[30].x, track.trackPoints[30].y, 'FALCON', 1)
        ];

        let messages = [];

        function addMessage(text) {
            messages.unshift({ text, timer: 180 });
            if (messages.length > 10) messages.pop();
        }

        // ============================================
        // GAME LOOP UPDATE
        // ============================================
        function update() {
            if (gameState.paused) return;

            gameState.gameTime++;

            // Process input
            input.throttle = (keys['w'] || keys['arrowup']) ? 1 : 0;
            input.braking = keys['s'] || keys['arrowdown'];
            input.steering = 0;
            if (keys['a'] || keys['arrowleft']) input.steering = -1;
            if (keys['d'] || keys['arrowright']) input.steering = 1;
            input.gear = keys['shift'] ? -1 : 1;
            input.handbraking = keys[' '];
            input.nitroActive = keys['n'];

            if (input.nitroActive && playerCar.nitroFuel > 0) {
                playerCar.isNitroActive = true;
            }

            // Update player
            playerCar.update(input, track);

            // Check lap progress
            const checkpointIndex = Math.floor((playerCar.checkpointsPassed % Math.floor(track.trackPoints.length / 8)));
            playerCar.checkpointLogic(track, checkpointIndex);

            // Update AI
            opponents.forEach(opponent => {
                opponent.update(track, playerCar);
                const oppCheckpointIndex = Math.floor((opponent.checkpointsPassed % Math.floor(track.trackPoints.length / 8)));
                opponent.checkpointLogic(track, oppCheckpointIndex);
            });

            // Update messages
            messages = messages.filter(m => {
                m.timer--;
                return m.timer > 0;
            });

            // Checkpoint notification
            if (gameState.showCheckpoint) {
                gameState.checkpointTimer--;
                if (gameState.checkpointTimer <= 0) {
                    gameState.showCheckpoint = false;
                }
            }

            // Win condition
            if (playerCar.checkpointsPassed > 0 && Math.floor(playerCar.checkpointsPassed / Math.floor(track.trackPoints.length / 8)) >= gameState.lapsToWin) {
                addMessage('🏆 RACE COMPLETE! YOU WIN!');
            }
        }

        // ============================================
        // RENDERING
        // ============================================
        function render() {
            // Clear and draw background
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#0f3a1f');
            gradient.addColorStop(1, '#1a2f2f');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw track
            track.draw();

            // Draw AI cars
            opponents.forEach(opponent => {
                opponent.draw();
            });

            // Draw player car
            playerCar.draw();

            // Draw messages
            ctx.fillStyle = '#ffff00';
            ctx.font = '20px Arial';
            messages.forEach((msg, i) => {
                const alpha = Math.min(1, msg.timer / 30);
                ctx.globalAlpha = alpha;
                ctx.fillText(msg.text, 20, 100 + i * 30);
            });
            ctx.globalAlpha = 1;

            // Draw checkpoint notification
            if (gameState.showCheckpoint) {
                const alpha = Math.min(1, gameState.checkpointTimer / 30);
                ctx.globalAlpha = alpha;
                ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                ctx.fillRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.strokeRect(canvas.width / 2 - 150, canvas.height / 2 - 40, 300, 80);
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`LAP ${gameState.currentLap - 1} COMPLETE`, canvas.width / 2, canvas.height / 2 + 10);
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
            }

            // Render mini-map
            renderMiniMap();

            // Update HUD
            updateHUD();
        }

        function renderMiniMap() {
            miniMapCtx.fillStyle = '#001a00';
            miniMapCtx.fillRect(0, 0, 200, 200);

            const scale = 200 / Math.max(canvas.width, canvas.height) * 0.5;

            // Draw track on mini-map
            miniMapCtx.strokeStyle = '#00ff00';
            miniMapCtx.lineWidth = 2;
            miniMapCtx.beginPath();
            miniMapCtx.moveTo((track.trackPoints[0].x - canvas.width / 2) * scale + 100, (track.trackPoints[0].y - canvas.height / 2) * scale + 100);
            for (let i = 1; i < track.trackPoints.length; i++) {
                miniMapCtx.lineTo((track.trackPoints[i].x - canvas.width / 2) * scale + 100, (track.trackPoints[i].y - canvas.height / 2) * scale + 100);
            }
            miniMapCtx.closePath();
            miniMapCtx.stroke();

            // Draw player
            miniMapCtx.fillStyle = '#ff3333';
            miniMapCtx.beginPath();
            miniMapCtx.arc((playerCar.x - canvas.width / 2) * scale + 100, (playerCar.y - canvas.height / 2) * scale + 100, 4, 0, Math.PI * 2);
            miniMapCtx.fill();

            // Draw opponents
            miniMapCtx.fillStyle = '#ffff00';
            opponents.forEach(opponent => {
                miniMapCtx.beginPath();
                miniMapCtx.arc((opponent.x - canvas.width / 2) * scale + 100, (opponent.y - canvas.height / 2) * scale + 100, 3, 0, Math.PI * 2);
                miniMapCtx.fill();
            });
        }

        function formatTime(frames) {
            const minutes = Math.floor(frames / 3600);
            const seconds = Math.floor((frames % 3600) / 60);
            const milliseconds = Math.floor((frames % 60) * 16.67);
            return `${minutes}:${seconds.toString().padStart(2, '0')}.${Math.floor(milliseconds / 10).toString().padStart(2, '0')}`;
        }

        function updateHUD() {
            // Time display
            document.getElementById('currentTime').textContent = formatTime(gameState.currentLapTime);

            // Position
            const allCars = [playerCar, ...opponents];
            allCars.sort((a, b) => b.checkpointsPassed - a.checkpointsPassed);
            const playerPosition = allCars.findIndex(car => car === playerCar) + 1;
            document.getElementById('position').textContent = `POS: ${playerPosition}/${allCars.length}`;

            // Lap info
            document.getElementById('lapNumber').textContent = `LAP ${gameState.currentLap}/${gameState.lapsToWin}`;

            // Stats
            const speed = Math.sqrt(playerCar.vx ** 2 + playerCar.vy ** 2);
            document.getElementById('speedStat').textContent = Math.floor(speed);
            document.getElementById('speedDisplay').textContent = Math.floor(speed);
            document.getElementById('throttleStat').textContent = Math.floor(input.throttle * 100) + '%';
            document.getElementById('gripStat').textContent = Math.floor(playerCar.getGripPercentage()) + '%';
            document.getElementById('distance').textContent = Math.floor((playerCar.checkpointsPassed / Math.floor(track.trackPoints.length / 8)) * 100) + '%';

            // Best lap
            if (gameState.bestLapTime !== Infinity) {
                document.getElementById('bestLap').textContent = formatTime(gameState.bestLapTime);
            }

            // Speedometer RPM
            const rpmPercent = (playerCar.rpm / playerCar.maxRPM) * 100;
            document.getElementById('rpmBar').style.width = rpmPercent + '%';

            // Gear display
            const gearNames = ['R', 'N', '1', '2', '3', '4', '5', '6'];
            document.getElementById('gearDisplay').textContent = gearNames[playerCar.gear + 1];

            // Health
            document.getElementById('healthValue').textContent = Math.ceil(playerCar.health);
            document.getElementById('healthBar').style.width = playerCar.health + '%';

            // Leaderboard
            const lb = document.getElementById('leaderboard');
            let html = '<div class="leaderboard-title">⚡ RIVALS</div>';
            allCars.forEach((car, idx) => {
                const isBest = car === playerCar ? ' best' : '';
                const laps = Math.floor(car.checkpointsPassed / Math.floor(track.trackPoints.length / 8));
                html += `<div class="leaderboard-entry${isBest}">${idx + 1}. ${car.name || 'PLAYER'} - LAP ${laps}</div>`;
            });
            lb.innerHTML = html;
        }

        // ============================================
        // MAIN LOOP
        // ============================================
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        document.getElementById('loadingScreen').classList.add('hidden');
        playerCar.lapStartTime = gameState.gameTime;
        gameLoop();
    </script>
</body>
</html>
