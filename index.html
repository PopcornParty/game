<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Arena - Multiplayer Space Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5), inset 0 0 30px rgba(0, 255, 136, 0.1);
            background: #0a0e27;
            cursor: none;
            max-width: 90vw;
            max-height: 90vh;
            display: block;
        }

        .ui-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .top-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-board {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .score-item {
            font-size: 16px;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: auto;
        }

        .title.show {
            opacity: 1;
        }

        .title h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            letter-spacing: 3px;
        }

        .title p {
            font-size: 18px;
            color: #00ff88;
            margin: 10px 0;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 14px;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            padding: 15px 25px;
            border: 1px solid #00ff88;
            border-radius: 5px;
            backdrop-filter: blur(10px);
        }

        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
            50% { text-shadow: 0 0 20px rgba(0, 255, 136, 1); }
        }

        .glow {
            animation: glow 1s infinite;
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            .score-board {
                padding: 10px 15px;
                font-size: 12px;
            }

            .title h1 {
                font-size: 32px;
            }

            .instructions {
                font-size: 12px;
                padding: 10px 15px;
                bottom: 10px;
            }

            .top-ui {
                top: 10px;
                left: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="gameCanvas"></canvas>
        <div class="ui-container">
            <div class="top-ui">
                <div class="score-board">
                    <div class="score-item">SCORE: <span id="score">0</span></div>
                    <div class="score-item">HEALTH: <span id="health">100</span>%</div>
                    <div class="score-item">LEVEL: <span id="level">1</span></div>
                </div>
                <div class="score-board">
                    <div class="score-item">ENEMIES: <span id="enemyCount">0</span></div>
                    <div class="score-item">AMMO: <span id="ammo">∞</span></div>
                    <div class="score-item">MULTIPLIER: <span id="multiplier">x1</span></div>
                </div>
            </div>
            <div class="title show" id="title">
                <h1>⚡ COSMIC ARENA ⚡</h1>
                <p>SURVIVE THE COSMIC ONSLAUGHT</p>
                <p id="titleSub">Click to Start</p>
            </div>
            <div class="instructions" id="instructions">
                MOVE: Arrow Keys / WASD | SHOOT: Space / Click | DASH: Shift | PAUSE: P
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // COSMIC ARENA - Ultimate Single-File Game
        // ============================================

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas sizing
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.9, 1200);
            canvas.height = Math.min(window.innerHeight * 0.9, 800);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================
        // GAME STATE
        // ============================================
        const gameState = {
            running: false,
            paused: false,
            score: 0,
            health: 100,
            maxHealth: 100,
            level: 1,
            multiplier: 1,
            kills: 0,
            waveNumber: 0,
            gameTime: 0
        };

        // ============================================
        // PLAYER
        // ============================================
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 12,
            vx: 0,
            vy: 0,
            speed: 5,
            angle: 0,
            health: 100,
            maxHealth: 100,
            dashCooldown: 0,
            dashDuration: 0,
            isDashing: false,
            shootCooldown: 0,
            shieldActive: false,
            shieldCooldown: 0,

            update() {
                // Handle input
                if (keys.ArrowUp || keys.w) this.vy -= this.speed;
                if (keys.ArrowDown || keys.s) this.vy += this.speed;
                if (keys.ArrowLeft || keys.a) this.vx -= this.speed;
                if (keys.ArrowRight || keys.d) this.vx += this.speed;

                // Dash mechanic
                if (keys.Shift && this.dashCooldown <= 0) {
                    this.dashCooldown = 120;
                    this.dashDuration = 20;
                    const length = Math.sqrt(this.vx ** 2 + this.vy ** 2);
                    if (length > 0) {
                        this.vx = (this.vx / length) * 12;
                        this.vy = (this.vy / length) * 12;
                    }
                    particles.createDash(this.x, this.y, this.vx, this.vy);
                }

                // Apply velocity with friction
                if (this.dashDuration > 0) {
                    this.dashDuration--;
                } else {
                    this.vx *= 0.85;
                    this.vy *= 0.85;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Boundary wrapping
                if (this.x - this.radius < 0) this.x = canvas.width + this.radius;
                if (this.x + this.radius > canvas.width) this.x = -this.radius;
                if (this.y - this.radius < 0) this.y = canvas.height + this.radius;
                if (this.y + this.radius > canvas.height) this.y = -this.radius;

                // Update cooldowns
                this.dashCooldown--;
                this.shootCooldown--;
                this.shieldCooldown--;

                // Auto aim towards mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                this.angle = Math.atan2(dy, dx);
            },

            shoot() {
                if (this.shootCooldown > 0) return;

                const bulletSpeed = 8;
                const spread = 0.15;

                for (let i = -1; i <= 1; i++) {
                    const angle = this.angle + i * spread;
                    bullets.push({
                        x: this.x + Math.cos(this.angle) * 20,
                        y: this.y + Math.sin(this.angle) * 20,
                        vx: Math.cos(angle) * bulletSpeed,
                        vy: Math.sin(angle) * bulletSpeed,
                        life: 200,
                        damage: 10,
                        radius: 4,
                        trail: []
                    });
                }

                particles.createMuzzleFlash(this.x, this.y, this.angle);
                this.shootCooldown = 8;
            },

            draw() {
                // Draw shield if active
                if (this.shieldActive) {
                    ctx.strokeStyle = `rgba(0, 255, 136, 0.6)`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 25, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Draw player ship
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Main body
                ctx.fillStyle = '#00ff88';
                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(-10, -12);
                ctx.lineTo(-5, 0);
                ctx.lineTo(-10, 12);
                ctx.closePath();
                ctx.fill();

                // Glow
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Thruster glow
                if (this.vx !== 0 || this.vy !== 0) {
                    ctx.fillStyle = 'rgba(255, 100, 0, 0.6)';
                    ctx.beginPath();
                    ctx.moveTo(-5, -8);
                    ctx.lineTo(-15, 0);
                    ctx.lineTo(-5, 8);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();
            },

            takeDamage(amount) {
                if (this.shieldActive) {
                    this.shieldActive = false;
                    this.shieldCooldown = 300;
                    return;
                }
                this.health -= amount;
                particles.createExplosion(this.x, this.y, 20, 'rgba(255, 100, 0, 0.8)');
                if (this.health <= 0) gameOver();
            }
        };

        // ============================================
        // ENEMIES
        // ============================================
        let enemies = [];

        class Enemy {
            constructor(x, y, type = 'basic') {
                this.x = x;
                this.y = y;
                this.type = type;
                this.radius = type === 'basic' ? 10 : type === 'tank' ? 15 : 8;
                this.health = type === 'tank' ? 30 : type === 'basic' ? 15 : 8;
                this.maxHealth = this.health;
                this.speed = type === 'basic' ? 2 : type === 'tank' ? 1 : 3.5;
                this.damage = type === 'basic' ? 10 : type === 'tank' ? 15 : 5;
                this.score = type === 'basic' ? 100 : type === 'tank' ? 250 : 50;
                this.angle = 0;
                this.shootCooldown = Math.random() * 100;
                this.fireRate = type === 'tank' ? 120 : 80;
            }

            update() {
                // AI: Chase player
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 0) {
                    this.vx = (dx / distance) * this.speed;
                    this.vy = (dy / distance) * this.speed;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.angle = Math.atan2(dy, dx);

                // Boundary wrapping
                if (this.x - this.radius < 0) this.x = canvas.width + this.radius;
                if (this.x + this.radius > canvas.width) this.x = -this.radius;
                if (this.y - this.radius < 0) this.y = canvas.height + this.radius;
                if (this.y + this.radius > canvas.height) this.y = -this.radius;

                // Shooting
                this.shootCooldown--;
                if (this.shootCooldown < 0) {
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 500) {
                        const angle = Math.atan2(dy, dx);
                        enemyBullets.push({
                            x: this.x + Math.cos(angle) * 15,
                            y: this.y + Math.sin(angle) * 15,
                            vx: Math.cos(angle) * 4,
                            vy: Math.sin(angle) * 4,
                            life: 200,
                            damage: this.damage,
                            radius: 5
                        });
                        this.shootCooldown = this.fireRate;
                    }
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                if (this.type === 'basic') {
                    ctx.fillStyle = '#ff3366';
                    ctx.beginPath();
                    ctx.moveTo(-12, 0);
                    ctx.lineTo(10, -10);
                    ctx.lineTo(5, 0);
                    ctx.lineTo(10, 10);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.type === 'tank') {
                    ctx.fillStyle = '#ff6600';
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#ff00ff';
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        ctx.lineTo(Math.cos((i / 4) * Math.PI * 2) * this.radius, Math.sin((i / 4) * Math.PI * 2) * this.radius);
                    }
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.restore();

                // Health bar for tanky enemies
                if (this.type === 'tank') {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                    ctx.fillRect(this.x - 15, this.y - 25, 30, 4);
                    ctx.fillStyle = '#00ff88';
                    ctx.fillRect(this.x - 15, this.y - 25, (this.health / this.maxHealth) * 30, 4);
                }
            }

            takeDamage(damage) {
                this.health -= damage;
                particles.createExplosion(this.x, this.y, 10, 'rgba(255, 100, 0, 0.6)');
            }
        }

        // ============================================
        // BULLETS & EFFECTS
        // ============================================
        let bullets = [];
        let enemyBullets = [];

        const particles = {
            list: [],

            add(particle) {
                this.list.push(particle);
            },

            createExplosion(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.random() * Math.PI * 2);
                    const speed = Math.random() * 5 + 2;
                    this.add({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 30,
                        maxLife: 30,
                        color: color || 'rgba(255, 100, 0, 0.8)',
                        size: Math.random() * 4 + 2,
                        type: 'spark'
                    });
                }
            },

            createMuzzleFlash(x, y, angle) {
                this.add({
                    x, y,
                    life: 5,
                    maxLife: 5,
                    angle,
                    type: 'flash'
                });
            },

            createDash(x, y, vx, vy) {
                for (let i = 0; i < 8; i++) {
                    this.add({
                        x: x + (Math.random() - 0.5) * 20,
                        y: y + (Math.random() - 0.5) * 20,
                        vx: vx * 0.5 + (Math.random() - 0.5) * 3,
                        vy: vy * 0.5 + (Math.random() - 0.5) * 3,
                        life: 15,
                        maxLife: 15,
                        color: 'rgba(0, 255, 136, 0.6)',
                        size: 3,
                        type: 'spark'
                    });
                }
            },

            update() {
                this.list = this.list.filter(p => {
                    p.life--;
                    p.x += (p.vx || 0);
                    p.y += (p.vy || 0);
                    return p.life > 0;
                });
            },

            draw() {
                this.list.forEach(p => {
                    if (p.type === 'spark') {
                        const alpha = p.life / p.maxLife;
                        ctx.fillStyle = p.color.replace('0.8', alpha * 0.8).replace('0.6', alpha * 0.6);
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (p.type === 'flash') {
                        ctx.fillStyle = `rgba(255, 200, 0, ${(p.life / p.maxLife) * 0.8})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }
        };

        // ============================================
        // WAVE SYSTEM
        // ============================================
        let waveTimer = 0;
        let waveDuration = 600;

        function startWave() {
            gameState.waveNumber++;
            waveTimer = 0;

            const enemyCount = 3 + gameState.level * 2 + gameState.waveNumber;
            const tankCount = Math.min(gameState.waveNumber, 3);
            const speedyCount = gameState.waveNumber > 2 ? Math.min(gameState.waveNumber - 2, 3) : 0;

            for (let i = 0; i < enemyCount - tankCount - speedyCount; i++) {
                const angle = (i / enemyCount) * Math.PI * 2;
                const distance = 300;
                enemies.push(new Enemy(
                    canvas.width / 2 + Math.cos(angle) * distance,
                    canvas.height / 2 + Math.sin(angle) * distance,
                    'basic'
                ));
            }

            for (let i = 0; i < tankCount; i++) {
                const angle = (Math.random() * Math.PI * 2);
                const distance = 350;
                enemies.push(new Enemy(
                    canvas.width / 2 + Math.cos(angle) * distance,
                    canvas.height / 2 + Math.sin(angle) * distance,
                    'tank'
                ));
            }

            for (let i = 0; i < speedyCount; i++) {
                const angle = (Math.random() * Math.PI * 2);
                const distance = 300;
                enemies.push(new Enemy(
                    canvas.width / 2 + Math.cos(angle) * distance,
                    canvas.height / 2 + Math.sin(angle) * distance,
                    'speedy'
                ));
            }
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        const keys = {};
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let autoShoot = false;

        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;

            if (e.key === 'p' || e.key === 'P') {
                gameState.paused = !gameState.paused;
            }

            if (e.key === ' ') {
                e.preventDefault();
                if (gameState.running && !gameState.paused) {
                    autoShoot = true;
                } else if (!gameState.running) {
                    startGame();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            if (e.key === ' ') autoShoot = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', () => {
            if (!gameState.running) {
                startGame();
            } else if (!gameState.paused) {
                autoShoot = true;
            }
        });

        canvas.addEventListener('mouseup', () => {
            autoShoot = false;
        });

        // ============================================
        // GAME FLOW
        // ============================================
        function startGame() {
            gameState.running = true;
            gameState.paused = false;
            gameState.score = 0;
            gameState.health = 100;
            gameState.level = 1;
            gameState.multiplier = 1;
            gameState.kills = 0;
            gameState.waveNumber = 0;
            gameState.gameTime = 0;

            player.health = player.maxHealth;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.vx = 0;
            player.vy = 0;

            enemies = [];
            bullets = [];
            enemyBullets = [];
            particles.list = [];

            document.getElementById('title').classList.remove('show');
            startWave();
        }

        function gameOver() {
            gameState.running = false;
            document.getElementById('titleSub').textContent = `GAME OVER | SCORE: ${gameState.score} | LEVEL: ${gameState.level}`;
            document.getElementById('title').classList.add('show');
        }

        // ============================================
        // COLLISION DETECTION
        // ============================================
        function checkCollisions() {
            // Player bullets hit enemies
            bullets = bullets.filter(bullet => {
                let hit = false;
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    const dx = bullet.x - enemy.x;
                    const dy = bullet.y - enemy.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < bullet.radius + enemy.radius) {
                        enemy.takeDamage(bullet.damage);
                        particles.createExplosion(bullet.x, bullet.y, 8, 'rgba(0, 255, 136, 0.7)');

                        if (enemy.health <= 0) {
                            gameState.score += Math.floor(enemy.score * gameState.multiplier);
                            gameState.kills++;
                            if (gameState.kills % 5 === 0) gameState.multiplier += 0.1;
                            enemies.splice(i, 1);
                        }

                        hit = true;
                        break;
                    }
                }
                return !hit && bullet.life > 0 && bullet.x > 0 && bullet.x < canvas.width && bullet.y > 0 && bullet.y < canvas.height;
            });

            // Enemy bullets hit player
            enemyBullets = enemyBullets.filter(bullet => {
                const dx = bullet.x - player.x;
                const dy = bullet.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < bullet.radius + player.radius) {
                    player.takeDamage(bullet.damage);
                    return false;
                }

                return bullet.life > 0 && bullet.x > 0 && bullet.x < canvas.width && bullet.y > 0 && bullet.y < canvas.height;
            });

            // Enemy collision with player
            enemies.forEach(enemy => {
                const dx = enemy.x - player.x;
                const dy = enemy.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < enemy.radius + player.radius) {
                    player.takeDamage(enemy.damage);
                    enemy.takeDamage(50);
                }
            });

            // Decrement all bullet lifetimes
            bullets.forEach(b => b.life--);
            enemyBullets.forEach(b => b.life--);
        }

        // ============================================
        // UPDATE LOOP
        // ============================================
        function update() {
            if (!gameState.running || gameState.paused) return;

            gameState.gameTime++;
            player.update();

            if (autoShoot) {
                player.shoot();
            }

            enemies.forEach(enemy => enemy.update());

            checkCollisions();
            particles.update();

            // Wave management
            waveTimer++;
            if (waveTimer > waveDuration || enemies.length === 0) {
                if (enemies.length === 0) {
                    gameState.level++;
                    gameState.multiplier = Math.max(1, gameState.multiplier - 0.2);
                }
                startWave();
            }

            // Difficulty curve
            if (gameState.gameTime % 300 === 0) {
                waveDuration = Math.max(300, waveDuration - 30);
            }

            // Update UI
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('health').textContent = Math.ceil(player.health);
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('enemyCount').textContent = enemies.length;
            document.getElementById('multiplier').textContent = `x${gameState.multiplier.toFixed(1)}`;
        }

        // ============================================
        // RENDER LOOP
        // ============================================
        function draw() {
            // Background with subtle animation
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#0a0e27');
            gradient.addColorStop(0.5, '#1a1a3e');
            gradient.addColorStop(1, '#0a0e27');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid background
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            if (gameState.running && !gameState.paused) {
                // Draw game elements
                particles.draw();
                player.draw();

                // Draw bullets
                bullets.forEach(bullet => {
                    ctx.fillStyle = '#00ff88';
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0, 255, 136, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                });

                // Draw enemy bullets
                enemyBullets.forEach(bullet => {
                    ctx.fillStyle = '#ff3366';
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Draw enemies
                enemies.forEach(enemy => enemy.draw());

                // Draw wave indicator
                ctx.fillStyle = 'rgba(0, 255, 136, 0.3)';
                ctx.font = '16px Arial';
                ctx.fillText(`WAVE ${gameState.waveNumber}`, 20, canvas.height - 20);
            } else if (gameState.paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff88';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
            }
        }

        // ============================================
        // MAIN LOOP
        // ============================================
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
