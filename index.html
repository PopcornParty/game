<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong Game</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: Arial;
        text-align: center;
    }
    canvas {
        display: none;
        margin: auto;
        background: black;
        border: 2px solid white;
    }
    #menu, #endScreen {
        margin-top: 100px;
    }
    button {
        padding: 15px 30px;
        font-size: 20px;
        margin: 10px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>PONG</h1>
    <button onclick="startGame('solo')">Solo (vs AI)</button>
    <button onclick="startGame('multi')">Multiplayer</button>
</div>

<div id="endScreen" style="display:none;">
    <h1 id="endText"></h1>
    <button onclick="goToMenu()">Back to Menu</button>
</div>

<canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameMode = "solo";
let running = false;

// Paddle
const paddleWidth = 10;
const paddleHeight = 100;
let leftY = 200;
let rightY = 200;

// Ball
let ballX = 400;
let ballY = 250;
let ballSpeedX = 10;
let ballSpeedY = 6;

// Scores
let leftScore = 0;
let rightScore = 0;
const WIN_SCORE = 5;

// Controls
let wPressed = false, sPressed = false;
let upPressed = false, downPressed = false;

// Start
function startGame(mode) {
    gameMode = mode;
    document.getElementById("menu").style.display = "none";
    document.getElementById("endScreen").style.display = "none";
    canvas.style.display = "block";

    leftScore = 0;
    rightScore = 0;
    leftY = rightY = 200;

    resetBall();
    running = true;
    gameLoop();
}

// Menu
function goToMenu() {
    running = false;
    canvas.style.display = "none";
    document.getElementById("endScreen").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

// Reset ball
function resetBall() {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
    ballSpeedX = (Math.random() > 0.5 ? 10 : -10);
    ballSpeedY = (Math.random() * 6) - 3;
}

// Controls
document.addEventListener("keydown", (e) => {
    if (e.key === "w") wPressed = true;
    if (e.key === "s") sPressed = true;
    if (e.key === "ArrowUp") upPressed = true;
    if (e.key === "ArrowDown") downPressed = true;

    // ESC = menu
    if (e.key === "Escape") goToMenu();
});

document.addEventListener("keyup", (e) => {
    if (e.key === "w") wPressed = false;
    if (e.key === "s") sPressed = false;
    if (e.key === "ArrowUp") upPressed = false;
    if (e.key === "ArrowDown") downPressed = false;
});

function update() {
    // Player 1
    if (wPressed) leftY -= 8;
    if (sPressed) leftY += 8;
    leftY = Math.max(0, Math.min(canvas.height - paddleHeight, leftY));

    // Player 2 / AI
    if (gameMode === "multi") {
        if (upPressed) rightY -= 8;
        if (downPressed) rightY += 8;
    } else {
        rightY = ballY - paddleHeight / 2; // perfect AI
    }
    rightY = Math.max(0, Math.min(canvas.height - paddleHeight, rightY));

    // Ball
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // Bounce
    if (ballY <= 0 || ballY >= canvas.height) ballSpeedY *= -1;

    // Paddle collisions
    if (ballX <= paddleWidth &&
        ballY >= leftY &&
        ballY <= leftY + paddleHeight) {
        ballSpeedX *= -1;
    }

    if (ballX >= canvas.width - paddleWidth &&
        ballY >= rightY &&
        ballY <= rightY + paddleHeight) {
        ballSpeedX *= -1;
    }

    // Scoring
    if (ballX < 0) {
        rightScore++;

        if (gameMode === "solo") {
            endGame("You Lose 💀 Score: " + leftScore);
            return;
        }

        checkWin();
        resetBall();
    }

    if (ballX > canvas.width) {
        leftScore++;
        checkWin();
        resetBall();
    }
}

// Win check
function checkWin() {
    if (leftScore >= WIN_SCORE) {
        endGame("Player 1 Wins 🏆");
    }
    if (rightScore >= WIN_SCORE) {
        endGame("Player 2 Wins 🏆");
    }
}

// End screen
function endGame(text) {
    running = false;
    canvas.style.display = "none";
    document.getElementById("endText").innerText = text;
    document.getElementById("endScreen").style.display = "block";
}

// Draw
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Paddles
    ctx.fillStyle = "white";
    ctx.fillRect(0, leftY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleWidth, rightY, paddleWidth, paddleHeight);

    // Ball
    ctx.beginPath();
    ctx.arc(ballX, ballY, 8, 0, Math.PI * 2);
    ctx.fill();

    // Score
    ctx.font = "40px Arial";
    ctx.fillText(leftScore, canvas.width / 4, 50);
    ctx.fillText(rightScore, canvas.width * 3 / 4, 50);

    // Menu hint
    ctx.font = "16px Arial";
    ctx.fillText("Press ESC for Menu", 10, canvas.height - 10);
}

// Loop
function gameLoop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
