<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong Game</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: Arial;
        text-align: center;
    }
    canvas {
        display: none;
        margin: auto;
        background: black;
        border: 2px solid white;
    }
    #menu {
        margin-top: 100px;
    }
    button {
        padding: 15px 30px;
        font-size: 20px;
        margin: 10px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="menu">
    <h1>PONG</h1>
    <button onclick="startGame('solo')">Solo (vs AI)</button>
    <button onclick="startGame('multi')">Multiplayer</button>
</div>

<canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameMode = "solo";

// Paddle settings
const paddleWidth = 10;
const paddleHeight = 100;

// Left paddle (Player 1)
let leftY = 200;

// Right paddle (Player 2 / AI)
let rightY = 200;

// Ball
let ballX = 400;
let ballY = 250;
let ballSpeedX = 10; // FAST
let ballSpeedY = 6;

// Controls
let wPressed = false;
let sPressed = false;
let upPressed = false;
let downPressed = false;

function startGame(mode) {
    gameMode = mode;
    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";
    resetBall();
    gameLoop();
}

function resetBall() {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
    ballSpeedX = (Math.random() > 0.5 ? 10 : -10);
    ballSpeedY = (Math.random() * 6) - 3;
}

// Controls
document.addEventListener("keydown", (e) => {
    if (e.key === "w") wPressed = true;
    if (e.key === "s") sPressed = true;
    if (e.key === "ArrowUp") upPressed = true;
    if (e.key === "ArrowDown") downPressed = true;
});

document.addEventListener("keyup", (e) => {
    if (e.key === "w") wPressed = false;
    if (e.key === "s") sPressed = false;
    if (e.key === "ArrowUp") upPressed = false;
    if (e.key === "ArrowDown") downPressed = false;
});

function update() {
    // Player 1 movement
    if (wPressed) leftY -= 8;
    if (sPressed) leftY += 8;

    // Clamp
    leftY = Math.max(0, Math.min(canvas.height - paddleHeight, leftY));

    // Player 2 or AI
    if (gameMode === "multi") {
        if (upPressed) rightY -= 8;
        if (downPressed) rightY += 8;
    } else {
        // PERFECT AI (never misses)
        rightY = ballY - paddleHeight / 2;
    }

    rightY = Math.max(0, Math.min(canvas.height - paddleHeight, rightY));

    // Ball movement
    ballX += ballSpeedX;
    ballY += ballSpeedY;

    // Top & bottom bounce
    if (ballY <= 0 || ballY >= canvas.height) {
        ballSpeedY *= -1;
    }

    // Left paddle collision
    if (
        ballX <= paddleWidth &&
        ballY >= leftY &&
        ballY <= leftY + paddleHeight
    ) {
        ballSpeedX *= -1;
    }

    // Right paddle collision
    if (
        ballX >= canvas.width - paddleWidth &&
        ballY >= rightY &&
        ballY <= rightY + paddleHeight
    ) {
        ballSpeedX *= -1;
    }

    // Score reset
    if (ballX < 0 || ballX > canvas.width) {
        resetBall();
    }
}

function draw() {
    // Clear
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Paddles
    ctx.fillStyle = "white";
    ctx.fillRect(0, leftY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleWidth, rightY, paddleWidth, paddleHeight);

    // Ball
    ctx.beginPath();
    ctx.arc(ballX, ballY, 8, 0, Math.PI * 2);
    ctx.fill();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
